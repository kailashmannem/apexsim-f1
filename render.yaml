services:
  - type: web
    name: apexsim-backend
    env: python
    region: ohio
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn backend.api:app --host 0.0.0.0 --port $PORT"
    disk:
      name: f1-cache
      mountPath: /opt/render/project/src/f1_cache
      sizeGB: 10